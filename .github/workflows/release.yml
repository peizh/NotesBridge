name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.0.0)"
        required: true
        type: string
      notarize:
        description: "Sign and notarize if Apple credentials are available"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  build-release:
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.notarize }}" == "true" ]]; then
            echo "notarize=1" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          NOTES_PATH="$RUNNER_TEMP/NotesBridge-${{ steps.meta.outputs.version }}-macOS.md"
          ./scripts/notesbridge.sh release-notes "${{ steps.meta.outputs.version }}" > "$NOTES_PATH"
          echo "path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: ${{ steps.meta.outputs.notarize == '1' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_TEMP_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "${BUILD_CERTIFICATE_BASE64:-}" || -z "${P12_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "Missing signing certificate secrets." >&2
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build release app
        env:
          NOTESBRIDGE_VERSION: ${{ steps.meta.outputs.version }}
          NOTESBRIDGE_BUNDLE_ID: dev.notesbridge.app
          NOTESBRIDGE_SIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          NOTESBRIDGE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTESBRIDGE_NOTARIZE: ${{ steps.meta.outputs.notarize }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          if [[ "${NOTESBRIDGE_NOTARIZE}" == "1" && -z "${NOTESBRIDGE_SIGN_IDENTITY:-}" ]]; then
            echo "Missing MACOS_DEVELOPER_ID_APPLICATION secret." >&2
            exit 1
          fi
          if [[ "${NOTESBRIDGE_NOTARIZE}" != "1" ]]; then
            export NOTESBRIDGE_SIGN_IDENTITY="-"
            export NOTESBRIDGE_TEAM_ID=""
          fi
          ./scripts/notesbridge.sh release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NotesBridge-${{ steps.meta.outputs.version }}-macOS
          path: |
            dist/NotesBridge.app
            dist/NotesBridge-${{ steps.meta.outputs.version }}-macOS.zip

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.meta.outputs.tag }}"
          RELEASE_TITLE="NotesBridge ${{ steps.meta.outputs.version }}"
          RELEASE_ASSET="dist/NotesBridge-${{ steps.meta.outputs.version }}-macOS.zip"
          RELEASE_NOTES="${{ steps.notes.outputs.path }}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" \
              "$RELEASE_ASSET" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES"
          fi

      - name: Prepare GitHub Pages checkout
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          SITE_DIR="$RUNNER_TEMP/gh-pages"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REMOTE_URL" "$SITE_DIR"
          else
            mkdir -p "$SITE_DIR"
            git init "$SITE_DIR"
            (
              cd "$SITE_DIR"
              git checkout --orphan gh-pages
              git remote add origin "$REMOTE_URL"
            )
          fi

          touch "$SITE_DIR/.nojekyll"
          mkdir -p "$SITE_DIR/updates"
          echo "site_dir=$SITE_DIR" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          ./scripts/notesbridge.sh appcast \
            --version "${{ steps.meta.outputs.version }}" \
            --archive "dist/NotesBridge-${{ steps.meta.outputs.version }}-macOS.zip" \
            --release-notes "${{ steps.notes.outputs.path }}" \
            --site-dir "${{ steps.pages.outputs.site_dir }}"

      - name: Publish GitHub Pages content
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          SITE_DIR="${{ steps.pages.outputs.site_dir }}"
          cd "$SITE_DIR"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
            exit 0
          fi

          git commit -m "Publish Sparkle appcast for ${{ steps.meta.outputs.version }}"
          git push origin HEAD:gh-pages
